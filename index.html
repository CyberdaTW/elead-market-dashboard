  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ize:14px;font-weight:600;min-width:140px;cursor:pointer\">\n          <option value=\"Indonesia\">Indonesia<\u002Foption>\n          <option value=\"Malaysia\">Malaysia (under construction)<\u002Foption>\n        <\u002Fsc-raw-select>\n      <\u002Flabel>\n      <label style=\"display:flex;flex-direction:column;gap:5px;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:#7f93b3;font-weight:600\">Year\n        <sc-raw-select value=\"{{ year }}\" onchange=\"{{ onYearChange }}\" style=\"background:#111c38;color:#e6edf6;border:1px solid #26375c;border-radius:8px;padding:9px 12px;font-size:14px;font-weight:600;min-width:130px;cursor:pointer\">\n          <option value=\"2022\">2022<\u002Foption>\n          <option value=\"2023\">2023<\u002Foption>\n          <option value=\"2024\">2024<\u002Foption>\n          <option value=\"2025\">2025<\u002Foption>\n          <option value=\"2026\">2026 MTD<\u002Foption>\n        <\u002Fsc-raw-select>\n      <\u002Flabel>\n      <label style=\"display:flex;flex-direction:column;gap:5px;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:#7f93b3;font-weight:600\">Month\n        <sc-raw-select value=\"{{ month }}\" onchange=\"{{ onMonthChange }}\" style=\"background:#111c38;color:#e6edf6;border:1px solid #26375c;border-radius:8px;padding:9px 12px;font-size:14px;font-weight:600;min-width:140px;cursor:pointer\">\n          <option value=\"Full Year\">Full Year<\u002Foption>\n          <option value=\"0\">January<\u002Foption>\n          <option value=\"1\">February<\u002Foption>\n          <option value=\"2\">March<\u002Foption>\n          <option value=\"3\">April<\u002Foption>\n          <option value=\"4\">May<\u002Foption>\n          <option value=\"5\">June<\u002Foption>\n          <option value=\"6\">July<\u002Foption>\n          <option value=\"7\">August<\u002Foption>\n          <option value=\"8\">September<\u002Foption>\n          <option value=\"9\">October<\u002Foption>\n          <option value=\"10\">November<\u002Foption>\n          <option value=\"11\">December<\u002Foption>\n        <\u002Fsc-raw-select>\n      <\u002Flabel>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- KPI CARDS -->\n  <sc-if value=\"{{ isIndonesia }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:20px\">\n    <div style=\"background:linear-gradient(180deg,#101c39,#0d1730);border:1px solid rgba(255,255,255,0.06);border-top:3px solid #008E8E;border-radius:14px;padding:20px 22px;box-shadow:0 12px 30px rgba(0,0,0,0.28)\">\n      <div style=\"font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:#7f93b3;font-weight:600;margin-bottom:12px\">{{ kpi1Label }}<\u002Fdiv>\n      <div style=\"font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:42px;line-height:1;color:#fff;letter-spacing:0.5px\">{{ kpi1Value }}<\u002Fdiv>\n      <div style=\"margin-top:12px;display:flex;align-items:center;gap:8px\">\n        <span style=\"font-size:12.5px;color:#8ea3c2\">{{ kpi1Sub }}<\u002Fspan>\n        <span style=\"font-size:11px;color:#008E8E;font-weight:600;background:rgba(0,142,142,0.12);padding:2px 8px;border-radius:20px\">units<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"background:linear-gradient(180deg,#101c39,#0d1730);border:1px solid rgba(255,255,255,0.06);border-top:3px solid {{ yoyColor }};border-radius:14px;padding:20px 22px;box-shadow:0 12px 30px rgba(0,0,0,0.28)\">\n      <div style=\"font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:#7f93b3;font-weight:600;margin-bottom:12px\">Year‑on‑Year Change<\u002Fdiv>\n      <div style=\"display:flex;align-items:baseline;gap:10px\">\n        <div style=\"font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:42px;line-height:1;letter-spacing:0.5px;color:{{ yoyColor }}\">{{ yoyLabel }}<\u002Fdiv>\n        <span style=\"font-size:22px;color:{{ yoyColor }}\">{{ yoyArrow }}<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"margin-top:12px;font-size:12.5px;color:#8ea3c2\">{{ yoySub }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"background:linear-gradient(180deg,#101c39,#0d1730);border:1px solid rgba(255,255,255,0.06);border-top:3px solid #f5b301;border-radius:14px;padding:20px 22px;box-shadow:0 12px 30px rgba(0,0,0,0.28)\">\n      <div style=\"font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:#7f93b3;font-weight:600;margin-bottom:12px\">USD / IDR Rate<\u002Fdiv>\n      <div style=\"display:flex;align-items:baseline;gap:8px\">\n        <span style=\"font-size:16px;color:#f5b301;font-weight:600\">Rp<\u002Fspan>\n        <div style=\"font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:42px;line-height:1;color:#fff;letter-spacing:0.5px\">{{ rateValue }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:12px;font-size:12.5px;color:#8ea3c2\">{{ rateSub }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- MAIN TREND CHART -->\n  <div style=\"background:linear-gradient(180deg,#0f1b37,#0c1630);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:20px 22px 14px;box-shadow:0 12px 30px rgba(0,0,0,0.28);margin-bottom:20px\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:8px\">\n      <div>\n        <div style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:16px;color:#fff;letter-spacing:0.4px\">Monthly Wholesales &amp; Exchange Rate — {{ yearLabel }}<\u002Fdiv>\n        <div style=\"font-size:12px;color:#7f93b3;margin-top:3px\">Dual‑axis: units against USD/IDR average · hover any month for detail<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:18px;align-items:center\">\n        <span style=\"display:flex;align-items:center;gap:7px;font-size:12px;color:#b6c6dd\"><span style=\"width:13px;height:13px;border-radius:3px;background:linear-gradient(180deg,#00C2C2,#045F5F)\"><\u002Fspan>Wholesales (units)<\u002Fspan>\n        <span style=\"display:flex;align-items:center;gap:7px;font-size:12px;color:#b6c6dd\"><span style=\"width:16px;height:0;border-top:2px dashed #f5b301\"><\u002Fspan>USD/IDR rate<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    {{ trendChart }}\n  <\u002Fdiv>\n\n  <!-- BOTTOM SPLIT -->\n  <div style=\"display:grid;grid-template-columns:0.95fr 1.05fr;gap:18px\">\n    <div style=\"background:linear-gradient(180deg,#0f1b37,#0c1630);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:20px 22px;box-shadow:0 12px 30px rgba(0,0,0,0.28)\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px\">\n        <div style=\"font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:16px;color:#fff;letter-spacing:0.4px\">Brand Market Share<\u002Fdiv>\n        <span style=\"font-size:11px;color:#008E8E;font-weight:600;background:rgba(0,142,142,0.12);padding:3px 10px;border-radius:20px\">{{ yearLabel }}<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:12px;color:#7f93b3;margin-bottom:6px\">Click a brand in the donut to see model breakdown →<\u002Fdiv>\n      {{ donutChart }}\n    <\u002Fdiv>\n\n    <div style=\"background:linear-gradient(180deg,#0f1b37,#0c1630);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:20px 22px;box-shadow:0 12px 30px rgba(0,0,0,0.28)\">\n      {{ modelChart }}\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- UNDER CONSTRUCTION -->\n  <sc-if value=\"{{ isOtherMarket }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:90px 20px;background:linear-gradient(180deg,#0f1b37,#0c1630);border:1px solid rgba(255,255,255,0.06);border-radius:14px;box-shadow:0 12px 30px rgba(0,0,0,0.28)\">\n    <div style=\"font-size:64px;line-height:1;margin-bottom:18px\">🚗🛠️<\u002Fdiv>\n    <div style=\"font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:26px;color:#fff;letter-spacing:0.4px;margin-bottom:10px\">{{ market }} dashboard is under construction<\u002Fdiv>\n    <div style=\"font-size:14px;color:#8ea3c2;max-width:440px;line-height:1.6;margin-bottom:22px\">Our team is tuning up the data pipeline for this market. Hang tight — wholesales, FX and brand analytics are coming soon.<\u002Fdiv>\n    <span style=\"font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#008E8E;background:rgba(0,142,142,0.14);border:1px solid rgba(0,142,142,0.35);padding:8px 18px;border-radius:20px\">Coming soon<\u002Fspan>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { year: '2026', month: 'Full Year', hoverIndex: null, selectedBrand: 'Toyota', market: 'Indonesia' };\n\n  // ---- static data ----\n  /*__DATA_START__*/\n  get DATA() {\n    return {\n      '2022': { units:[84149,80995,98535,82731,49710,78910,86245,96956,99986,93194,91275,105354], rates:[14342,14347,14341,14389,14579,14702,14990,14834,14994,15442,15660,15585], yoy:18.1, mtd:false },\n      '2023': { units:[94270,87059,101272,58981,82189,82656,80504,88928,79919,80350,84390,85284], rates:[15257,15150,15287,14874,14831,14940,15048,15253,15374,15760,15595,15510], yoy:-4.0, mtd:false },\n      '2024': { units:[69758,70772,74720,48764,71391,74615,74230,76302,73108,77404,74853,79806], rates:[15634,15654,15695,16089,16070,16355,16252,15756,15326,15580,15821,16044], yoy:-13.9, mtd:false },\n      '2025': { units:[62084,72356,71099,52108,60697,58363,60837,61771,62090,74051,74131,94100], rates:[16258,16346,16472,16829,16428,16305,16297,16308,16535,16604,16699,16695], yoy:-7.2, mtd:false },\n      '2026': { units:[66499,81247,61271,80779,69219], rates:[16832,16827,16924,17156,17595], yoy:12.8, mtd:true }\n    };\n  }\n  /*__DATA_END__*/\n  \n  get BASE_TOTAL() { return 359015; }\n  /*__BRANDS_START__*/\n  get BRANDS() {\n    return [\n      { name:'Toyota', value:111119, color:'#00C2C2', models:[['Avanza',42000,-8.2],['Kijang Innova Zenix',38000,3.1],['Rush',26000,-5.0],['Yaris Cross',24000,18.7],['Calya',24000,-11.2],['Hilux',22000,6.4],['Agya',21000,-14.5],['Raize',20000,-9.1],['Fortuner',19000,2.2],['Veloz',16000,-6.3]] },\n      { name:'Daihatsu', value:59420, color:'#2dd4bf', models:[['Sigra',34000,-6.1],['Gran Max',32000,1.8],['Xenia',22000,-9.4],['Terios',18000,-4.2],['Ayla',17000,-12.8],['Rocky',15000,-7.7]] },\n      { name:'Suzuki', value:30262, color:'#818cf8', models:[['Ertiga',22000,-6.6],['Carry',18000,-2.1],['XL7',15000,-9.0],['Jimny',7000,3.8]] },\n      { name:'Mitsubishi', value:28445, color:'#6366f1', models:[['Xpander',38000,-7.2],['Pajero Sport',12000,1.4],['Triton',11000,5.9],['Xforce',9000,22.4]] },\n      { name:'Honda', value:18271, color:'#38bdf8', models:[['Brio',34000,-5.5],['HR-V',14000,2.1],['WR-V',12000,-8.9],['BR-V',11000,-3.3],['CR-V',7000,4.6]] },\n      { name:'BYD', value:17993, color:'#34d399', models:[['M6',7000,118.5],['Dolphin',6000,52.3],['Atto 3',8000,34.2],['Seal',5000,41.0]] },\n      { name:'Jaecoo', value:14284, color:'#f472b6', models:[['(model detail pending)',14284,0]] },\n      { name:'Fuso', value:13459, color:'#a78bfa', models:[['Canter',26000,-2.9],['Fighter',8000,4.3]] },\n      { name:'Isuzu', value:10820, color:'#0ea5e9', models:[['Traga',11000,-1.8],['Elf',9000,2.6],['D-Max',4000,7.0]] },\n      { name:'Hino', value:8341, color:'#fb923c', models:[['(model detail pending)',8341,0]] },\n      { name:'Hyundai', value:7816, color:'#f59e0b', models:[['Creta',12000,2.4],['Stargazer',9000,-4.1],['Santa Fe',4000,8.8],['Ioniq 5',3000,15.6]] },\n      { name:'Others', value:48885, color:'#64748b', models:[['(model detail pending)',48885,0]] }\n    ];\n  }\n  /*__BRANDS_END__*/\n\n  get monthNames() { return ['January','February','March','April','May','June','July','August','September','October','November','December']; }\n  get monthShort() { return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; }\n\n  fmt(n) { return Math.round(n).toLocaleString('en-US'); }\n  yearName(y) { return y === '2026' ? '2026 MTD' : y; }\n\n  renderVals() {\n    const h = React.createElement;\n    const { year, month, selectedBrand } = this.state;\n    const yd = this.DATA[year];\n    const units = yd.units, rates = yd.rates;\n    const total = units.reduce((a,b)=>a+b,0);\n    const avgRate = Math.round(rates.reduce((a,b)=>a+b,0)/rates.length);\n    const monthSel = month === 'Full Year' ? -1 : parseInt(month,10);\n    const scale = total / this.BASE_TOTAL;\n\n    // KPI 1\n    let kpi1Value, kpi1Sub, kpi1Label;\n    if (monthSel >= 0 && monthSel < units.length) {\n      kpi1Label = 'Wholesales';\n      kpi1Value = this.fmt(units[monthSel]);\n      kpi1Sub = this.monthNames[monthSel] + ' ' + this.yearName(year);\n    } else {\n      kpi1Label = 'Total Wholesales';\n      kpi1Value = this.fmt(total);\n      kpi1Sub = (yd.mtd ? 'Year-to-date ' : 'Full Year ') + this.yearName(year);\n    }\n\n    // KPI 2 yoy\n    const yoy = yd.yoy;\n    const yoyPos = yoy >= 0;\n    const yoyColor = yoyPos ? '#34d399' : '#fb7185';\n    const yoyLabel = (yoyPos ? '+' : '') + yoy.toFixed(1) + '%';\n    const yoyArrow = yoyPos ? '\\u25B2' : '\\u25BC';\n    const prevMap = { '2022':'2021','2023':'2022','2024':'2023','2025':'2024','2026':'2025' };\n    const prevY = prevMap[year];\n    const prevTotal = this.DATA[prevY] ? this.DATA[prevY].units.reduce((a,b)=>a+b,0) : Math.round(total/(1+yoy/100));\n    const yoySub = 'vs ' + this.yearName(prevY) + ' \\u00B7 ' + this.fmt(prevTotal) + ' units baseline';\n\n    // KPI 3 rate\n    const rmin = Math.min(...rates), rmax = Math.max(...rates);\n    const rateSub = 'Avg \\u00B7 range Rp ' + this.fmt(rmin) + '\\u2013' + this.fmt(rmax);\n\n    const market = this.state.market;\n    return {\n      year, month, yearLabel: this.yearName(year),\n      market, isIndonesia: market === 'Indonesia', isOtherMarket: market !== 'Indonesia',\n      onMarketChange: (e)=>this.setState({ market: e.target.value }),\n      onYearChange: (e)=>this.setState({ year: e.target.value, hoverIndex:null }),\n      onMonthChange: (e)=>this.setState({ month: e.target.value }),\n      kpi1Label, kpi1Value, kpi1Sub,\n      yoyColor, yoyLabel, yoyArrow, yoySub,\n      rateValue: this.fmt(avgRate), rateSub,\n      trendChart: this.buildTrend(units, rates, monthSel),\n      donutChart: this.buildDonut(scale),\n      modelChart: this.buildModels(scale)\n    };\n  }\n\n  // ---------- TREND CHART ----------\n  buildTrend(units, rates, monthSel) {\n    const h = React.createElement;\n    const W=920, H=360, pL=62, pR=858, pT=18, pB=316;\n    const plotW=pR-pL, plotH=pB-pT, n=units.length;\n    const slot=plotW/n, barW=Math.min(40, slot*0.5);\n    const maxU=Math.max(...units)*1.12;\n    const uy=u=>pB-(u/maxU)*plotH;\n    const rmin=Math.min(...rates), rmax=Math.max(...rates);\n    const span=(rmax-rmin)||1;\n    const rlo=rmin-span*0.7, rhi=rmax+span*0.5;\n    const ry=r=>pB-(r-rlo)/(rhi-rlo)*plotH;\n    const cx=i=>pL+slot*(i+0.5);\n    const hover=this.state.hoverIndex;\n    const kids=[];\n\n    kids.push(h('defs',{key:'d'},[\n      h('linearGradient',{key:'bg',id:'barGrad',x1:0,y1:0,x2:0,y2:1},[\n        h('stop',{key:0,offset:'0%',stopColor:'#00C2C2'}),\n        h('stop',{key:1,offset:'100%',stopColor:'#045F5F'})\n      ]),\n      h('linearGradient',{key:'bgh',id:'barGradH',x1:0,y1:0,x2:0,y2:1},[\n        h('stop',{key:0,offset:'0%',stopColor:'#baf7f2'}),\n        h('stop',{key:1,offset:'100%',stopColor:'#008E8E'})\n      ])\n    ]));\n\n    // horizontal gridlines + left unit labels\n    for (let i=0;i<=4;i++){\n      const val=maxU*i/4, y=uy(val);\n      kids.push(h('line',{key:'g'+i,x1:pL,y1:y,x2:pR,y2:y,stroke:'rgba(255,255,255,0.06)',strokeWidth:1}));\n      kids.push(h('text',{key:'gl'+i,x:pL-10,y:y+4,textAnchor:'end',fontSize:11,fill:'#5f7391',fontFamily:'Barlow'}, (val/1000).toFixed(0)+'k'));\n    }\n    // right rate labels\n    [rmin,(rmin+rmax)/2,rmax].forEach((r,i)=>{\n      kids.push(h('text',{key:'rl'+i,x:pR+10,y:ry(r)+4,textAnchor:'start',fontSize:11,fill:'#f5b301',fontFamily:'Barlow'}, this.fmt(r)));\n    });\n    // axis titles\n    kids.push(h('text',{key:'ax1',x:pL-46,y:pT-4,fontSize:10,fill:'#7f93b3',fontFamily:'Barlow',letterSpacing:'0.5px'},'UNITS'));\n    kids.push(h('text',{key:'ax2',x:pR+10,y:pT-4,fontSize:10,fill:'#c99202',fontFamily:'Barlow',letterSpacing:'0.5px'},'IDR'));\n\n    // bars\n    units.forEach((u,i)=>{\n      const isSel = (monthSel===i) || (hover===i);\n      kids.push(h('rect',{key:'b'+i,x:cx(i)-barW/2,y:uy(u),width:barW,height:pB-uy(u),rx:4,\n        fill:isSel?'url(#barGradH)':'url(#barGrad)',\n        stroke:isSel?'#d6fffa':'none',strokeWidth:isSel?1.5:0,\n        style:{transition:'all .15s'}}));\n    });\n\n    // rate line (dashed)\n    const linePts=rates.map((r,i)=>cx(i)+','+ry(r)).join(' ');\n    kids.push(h('polyline',{key:'rline',points:linePts,fill:'none',stroke:'#f5b301',strokeWidth:2.5,strokeDasharray:'7 5',strokeLinejoin:'round'}));\n    rates.forEach((r,i)=>{\n      const on=(hover===i)||(monthSel===i);\n      kids.push(h('circle',{key:'rp'+i,cx:cx(i),cy:ry(r),r:on?5.5:3.5,fill:'#0B132B',stroke:'#f5b301',strokeWidth:2.5}));\n    });\n\n    // x labels\n    units.forEach((u,i)=>{\n      const on=(hover===i)||(monthSel===i);\n      kids.push(h('text',{key:'x'+i,x:cx(i),y:pB+22,textAnchor:'middle',fontSize:12,fontWeight:on?700:500,fill:on?'#e6edf6':'#7f93b3',fontFamily:'Barlow'}, this.monthShort[i]));\n    });\n\n    // hover capture\n    units.forEach((u,i)=>{\n      kids.push(h('rect',{key:'h'+i,x:pL+slot*i,y:pT,width:slot,height:plotH,fill:'transparent',\n        onMouseEnter:()=>this.setState({hoverIndex:i}),\n        onMouseLeave:()=>this.setState({hoverIndex:null}),\n        style:{cursor:'pointer'}}));\n    });\n\n    // tooltip\n    if (hover!=null){\n      const tw=168, th=78;\n      let tx= gend]);\n  }\n\n  // ---------- MODEL BREAKDOWN ----------\n  buildModels(scale){\n    const h=React.createElement;\n    const brand=this.BRANDS.find(b=>b.name===this.state.selectedBrand)||this.BRANDS[0];\n    const models=brand.models.map(m=>({name:m[0],v:Math.round(m[1]*scale),yoy:m[2]})).sort((a,b)=>b.v-a.v);\n    const maxV=Math.max(...models.map(m=>m.v));\n    const total=models.reduce((a,b)=>a+b.v,0);\n\n    const header=h('div',{key:'hd',style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'14px'}},[\n      h('div',{key:'l'},[\n        h('div',{key:1,style:{display:'flex',alignItems:'center',gap:'9px'}},[\n          h('span',{key:'d',style:{width:'13px',height:'13px',borderRadius:'4px',background:brand.color}}),\n          h('span',{key:'t',style:{fontFamily:'Chakra Petch',fontWeight:600,fontSize:'16px',color:'#fff',letterSpacing:'0.4px'}},brand.name+' \\u2014 Model Breakdown')\n        ]),\n        h('div',{key:2,style:{fontSize:'12px',color:'#7f93b3',marginTop:'3px',marginLeft:'22px'}}, this.fmt(total)+' units \\u00B7 '+models.length+' models')\n      ]),\n      h('span',{key:'r',style:{fontSize:'11px',color:'#7f93b3',fontWeight:600,letterSpacing:'0.5px',textTransform:'uppercase'}},'YoY')\n    ]);\n\n    const rows=models.map((m,i)=>{\n      const pos=m.yoy>=0, col=pos?'#34d399':'#fb7185';\n      return h('div',{key:i,style:{marginBottom:'11px'}},[\n        h('div',{key:'top',style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'5px'}},[\n          h('span',{key:'n',style:{fontSize:'13px',color:'#e6edf6',fontWeight:500}},m.name),\n          h('div',{key:'r',style:{display:'flex',alignItems:'center',gap:'10px'}},[\n            h('span',{key:'v',style:{fontSize:'13px',color:'#b6c6dd',fontFamily:'Barlow',fontWeight:600}}, this.fmt(m.v)),\n            h('span',{key:'y',style:{fontSize:'11.5px',fontWeight:700,color:col,background:pos?'rgba(52,211,153,0.13)':'rgba(251,113,133,0.13)',padding:'2px 8px',borderRadius:'20px',minWidth:'58px',textAlign:'center',display:'inline-block'}}, (pos?'+':'')+m.yoy.toFixed(1)+'%')\n          ])\n        ]),\n        h('div',{key:'bar',style:{height:'8px',borderRadius:'6px',background:'rgba(255,255,255,0.05)',overflow:'hidden'}},\n          h('div',{style:{height:'100%',width:(m.v/maxV*100)+'%',borderRadius:'6px',background:'linear-gradient(90deg,'+brand.color+'aa,'+brand.color+')',transition:'width .3s'}}))\n      ]);\n    });\n\n    return h('div',{},[header,h('div',{key:'rows',style:{maxHeight:'330px',overflowY:'auto',paddingRight:'6px'}},rows)]);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
